<!DOCTYPE html>
<html>
<head>
  <title>Driver Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <h2>Driver Control Panel</h2>

  <div class="row">
    <button onclick="syncLocation(true)">Manual GPS Sync</button>
    <button onclick="recalculateRoute()">Recalculate Route</button>
    <span id="gpsStatus">GPS: idle</span>
  </div>

  <div class="row">
    <input id="startSearch" placeholder="Search start location">
    <button onclick="searchStart()">Search</button>
  </div>

  <div class="row">
    <input id="destSearch" placeholder="Search destination">
    <button onclick="searchDestination()">Search</button>
    <button onclick="startRoute()">Start Route</button>
  </div>

  <p>Click map to add bus stops (driver-defined).</p>

  <div id="map"></div>

  <script src="/static/driver.js"></script>
</body>
</html>
